name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,server]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Typecheck (mypy strict)
        run: python -m mypy
      - name: Test
        run: pytest -q
      - name: Demo
        run: llmbim demo --out /tmp/llmbim-demo
      - name: Real-case packs
        run: python scripts/verify_all.py
      - name: Schad golden command (Gate D)
        run: llmbim case schad --out /tmp/llmbim-schad
      - name: Chat path smoke
        run: python scripts/chat_smoke.py
