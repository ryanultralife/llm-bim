# Mobile-friendly Gemini entry point: comment "@gemini-cli <request>" on any
# issue or PR (GitHub mobile app works) and Gemini CLI runs HERE, in CI, with
# shell + the installed kernel — no local CLI needed.
#
# Setup (one manual step): add repo secret GEMINI_API_KEY
#   (Settings → Secrets and variables → Actions; key from aistudio.google.com/apikey).
# Without the secret the job fails fast and harmlessly.
#
# This is the minimal single-file variant. For Google's full official set
# (dispatch + review + triage + plan/execute), run `gemini` locally and use
# `/setup-github`, or copy from google-github-actions/run-gemini-cli
# examples/workflows/.

name: Gemini assist

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  gemini:
    # Collaborator-gated, same as Google's official dispatch example — drive-by
    # comments from non-collaborators never start the agent.
    if: >
      contains(github.event.comment.body, '@gemini-cli') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install llm-bim kernel
        run: |
          pip install -e ".[dev,server]"
          llmbim version

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_issue_number: ${{ github.event.issue.number }}
          upload_artifacts: "true"
          settings: |
            {
              "maxSessionTurns": 40
            }
          prompt: |
            You are working in the llm-bim repository, already checked out and
            installed (`llmbim version` works). FIRST read GEMINI.md and
            skills/llm-bim/SKILL.md and follow them — kernel-only mutations,
            honesty rules, verify gates, one output path.

            A repository collaborator asked (via issue/PR comment):

            ${{ github.event.comment.body }}

            Do the work. If it produces a pack, build it under output/ and
            state the single entry path. If it changes repo files, commit on a
            branch named gemini/<short-slug> and push it (git credentials are
            configured), then say what you did and which gates you ran in a
            reply comment on the issue. Never claim done with failing gates.
